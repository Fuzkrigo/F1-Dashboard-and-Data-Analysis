[pytest]
asyncio_mode = auto
asyncio_default_fixture_loop_scope = function
# [EN] Put the project root on sys.path so `import src...` works no matter how
# pytest is invoked (bare `pytest` does NOT add CWD like `python -m pytest` does).
# [PT-BR] Coloca a raiz no sys.path para `import src...` funcionar independente da
# invocação (o `pytest` puro NAO adiciona o CWD como o `python -m pytest` faz).
pythonpath = .
